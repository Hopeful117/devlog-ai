services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devlog-backend
    restart: unless-stopped
    depends_on:
      ai-engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-devlog_ai}
      DB_USERNAME: ${POSTGRES_USER:-devlog}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devlog}
      AI_ENGINE_BASE_URL: http://ai-engine:8000
      AI_ENGINE_CONNECT_TIMEOUT: ${AI_ENGINE_CONNECT_TIMEOUT:-2s}
      AI_ENGINE_READ_TIMEOUT: ${AI_ENGINE_READ_TIMEOUT:-5s}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: devlog-ai-engine
    restart: unless-stopped
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:17
    container_name: devlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devlog_ai}
      POSTGRES_USER: ${POSTGRES_USER:-devlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devlog}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - devlog-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  devlog-postgres-data:
