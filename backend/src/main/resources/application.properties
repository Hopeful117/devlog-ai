spring.application.name=devlog-ai-backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devlog_ai}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${DB_USERNAME:devlog}
spring.datasource.password=${DB_PASSWORD:devlog}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

collection.workspace-root=${COLLECTION_WORKSPACE_ROOT:./data/workspaces}

ai-engine.base-url=${AI_ENGINE_BASE_URL:http://localhost:8000}
ai-engine.connect-timeout=${AI_ENGINE_CONNECT_TIMEOUT:2s}
ai-engine.read-timeout=${AI_ENGINE_READ_TIMEOUT:5s}
