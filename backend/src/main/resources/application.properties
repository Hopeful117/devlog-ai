spring.application.name=devlog-ai-backend
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.hopeful117.devlogai=${LOG_LEVEL_APP:INFO}
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} correlationId=%X{correlationId:-none} logger=%logger{36} message=%msg%n%wEx
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devlog_ai}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${DB_USERNAME:devlog}
spring.datasource.password=${DB_PASSWORD:devlog}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

collection.workspace-root=${COLLECTION_WORKSPACE_ROOT:./data/workspaces}

devlog.collection.max-files=${COLLECTION_MAX_FILES:10000}
devlog.collection.max-file-size=${COLLECTION_MAX_FILE_SIZE:1048576}
devlog.collection.max-total-bytes=${COLLECTION_MAX_TOTAL_BYTES:20971520}
devlog.collection.max-facts-per-type=${COLLECTION_MAX_FACTS_PER_TYPE:500}
devlog.collection.collector-timeout=${COLLECTION_COLLECTOR_TIMEOUT:10s}
devlog.collection.excluded-directories=.git,target,build,node_modules,dist,out,coverage,.venv,venv
devlog.collection.collectors.repository-metadata.enabled=true
devlog.collection.collectors.build.enabled=true
devlog.collection.collectors.spring.enabled=true
devlog.collection.collectors.docker.enabled=true
devlog.collection.collectors.documentation.enabled=true
devlog.collection.collectors.test-structure.enabled=true

# ADR-035/ADR-036: bound future AI-facing commit-diff contexts.
devlog.history.context.max-files=${HISTORY_CONTEXT_MAX_FILES:200}
devlog.history.context.max-changed-lines=${HISTORY_CONTEXT_MAX_CHANGED_LINES:20000}

ai-engine.base-url=${AI_ENGINE_BASE_URL:http://localhost:8000}
ai-engine.connect-timeout=${AI_ENGINE_CONNECT_TIMEOUT:2s}
ai-engine.read-timeout=${AI_ENGINE_READ_TIMEOUT:5s}
