services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devlog-backend
    restart: unless-stopped
    depends_on:
      ai-engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-devlog_ai}
      DB_USERNAME: ${POSTGRES_USER:-devlog}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devlog}
      AI_ENGINE_BASE_URL: http://ai-engine:8000
      AI_ENGINE_CONNECT_TIMEOUT: ${AI_ENGINE_CONNECT_TIMEOUT:-2s}
      AI_ENGINE_READ_TIMEOUT: ${AI_ENGINE_READ_TIMEOUT:-5s}
      COLLECTION_WORKSPACE_ROOT: /var/lib/devlog-ai/workspaces
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      LOG_LEVEL_ROOT: ${BACKEND_LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${BACKEND_LOG_LEVEL_APP:-INFO}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - devlog-workspaces:/var/lib/devlog-ai/workspaces

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: devlog-ai-engine
    restart: unless-stopped
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-2000}
      CORE_BASE_URL: http://backend:8080
      CORE_CALLBACK_TIMEOUT_SECONDS: ${CORE_CALLBACK_TIMEOUT_SECONDS:-5}
      CORE_CALLBACK_MAX_ATTEMPTS: ${CORE_CALLBACK_MAX_ATTEMPTS:-5}
      CORE_CALLBACK_INITIAL_DELAY_MS: ${CORE_CALLBACK_INITIAL_DELAY_MS:-100}
      CORE_CALLBACK_MAX_DELAY_MS: ${CORE_CALLBACK_MAX_DELAY_MS:-1000}
      LOG_LEVEL: ${AI_ENGINE_LOG_LEVEL:-INFO}
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:17
    container_name: devlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devlog_ai}
      POSTGRES_USER: ${POSTGRES_USER:-devlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devlog}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - devlog-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  devlog-postgres-data:
  devlog-workspaces:
